version: '3.8'

services:
  backend:
    build:
      context: ./backend
      target: development
    container_name: chatbot_backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - mongo
    networks:
      - chatbot_network

  frontend:
    build:
      context: ./frontend
      target: development
    container_name: chatbot_frontend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
    env_file:
      - ./frontend/.env.local
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - chatbot_network

  mongo:
    image: mongo:6
    container_name: chatbot_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - chatbot_network

networks:
  chatbot_network:
    driver: bridge

volumes:
  mongo_data: